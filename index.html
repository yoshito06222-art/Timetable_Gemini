<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ultimate Timetable</title>
<style>
/* ═══════════ THEME ENGINE ═══════════ */
:root { --bg:#fafafa; --sur:#fff; --sur2:#f0f0f0; --brd:#e0e0e0; --acc:#222; --txt:#111; --mut:#888; }
.th-minimal {--bg:#fafafa;--sur:#ffffff;--sur2:#f0f0f0;--brd:#e0e0e0;--acc:#222222;--txt:#111111;--mut:#888888}
.th-obsidian{--bg:#0a0a0f;--sur:#12121a;--sur2:#1a1a25;--brd:#252535;--acc:#3d9cf0;--txt:#e8eaf0;--mut:#7a8098}
.th-charcoal{--bg:#1e2028;--sur:#262830;--sur2:#2e3038;--brd:#383a45;--acc:#4ecba8;--txt:#dde0e8;--mut:#8890a0}

/* ═══════════ LAYOUT ═══════════ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--txt); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

.hdr { background: var(--sur); border-bottom: 1px solid var(--brd); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.nav { display: flex; background: var(--sur); border-bottom: 1px solid var(--brd); }
.nav-tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; color: var(--mut); cursor: pointer; border-bottom: 2px solid transparent; }
.nav-tab.on { color: var(--acc); border-bottom-color: var(--acc); font-weight: bold; }

.view { flex: 1; overflow-y: auto; display: none; }
.view.active { display: block; }
#vcal { display: none; flex-direction: column; overflow: hidden; }
#vcal.active { display: flex; }

/* ═══════════ CALENDAR GRID ═══════════ */
.cal-outer { flex: 1; overflow: hidden; padding: 8px; position: relative; }
.cal { display: grid; gap: 3px; height: 100%; }
.cell { background: var(--sur); border: 1px solid var(--brd); border-radius: 6px; position: relative; min-height: 50px; }
.cblk { position: absolute; inset: 2px; border-radius: 4px; padding: 4px; font-size: 10px; border-left: 4px solid var(--acc); overflow: hidden; }

/* ═══════════ FORMS & MODALS ═══════════ */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
.modal { background: var(--sur); border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; padding: 20px; max-height: 90vh; overflow-y: auto; }
.fg { margin-bottom: 12px; }
.fg label { display: block; font-size: 11px; margin-bottom: 4px; color: var(--mut); }
.fg input, .fg select, .fg textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--brd); background: var(--sur2); color: var(--txt); }

/* Color Indicators */
.c0{background:rgba(124,106,247,0.1); border-color:#7c6af7;}
.c1{background:rgba(94,234,212,0.1); border-color:#5eead4;}
.c2{background:rgba(251,191,36,0.1); border-color:#fbbf24;}
</style>
</head>
<body class="th-minimal">

<div class="hdr">
  <span id="cur-month" style="font-weight:bold">Timetable</span>
  <div>
    <button onclick="changeWeek(-1)">←</button>
    <button onclick="changeWeek(0)">今日</button>
    <button onclick="changeWeek(1)">→</button>
  </div>
</div>

<div class="nav">
  <div class="nav-tab on" onclick="switchTab('vcal', this)">カレンダー</div>
  <div class="nav-tab" onclick="switchTab('vassign', this)">課題</div>
  <div class="nav-tab" onclick="switchTab('vsettings', this)">設定</div>
</div>

<div id="vcal" class="view active">
  <div id="cal-grid" class="cal"></div>
</div>

<div id="vassign" class="view">
  <div style="padding:16px;">
    <h3>課題一覧</h3>
    <div id="assign-list"></div>
  </div>
</div>

<div id="vsettings" class="view">
  <div style="padding:16px;">
    <h3>設定</h3>
    <div class="fg">
      <label>テーマ</label>
      <select onchange="document.body.className = this.value">
        <option value="th-minimal">Minimal</option>
        <option value="th-obsidian">Obsidian</option>
        <option value="th-charcoal">Charcoal</option>
      </select>
    </div>
    <button onclick="D={...initD}; dbSave(); location.reload();">データをリセット</button>
  </div>
</div>

<!-- クイック追加モーダル -->
<div class="ov" id="m-add">
  <div class="modal">
    <h3 id="add-title">授業を追加</h3>
    <div class="fg"><label>授業名</label><input id="f-name" type="text"></div>
    <div class="fg"><label>教室</label><input id="f-room" type="text"></div>
    <div class="btn-row" style="display:flex; gap:10px; margin-top:20px;">
      <button onclick="saveClass()" style="flex:1; padding:12px; background:var(--acc); color:#fff; border:none; border-radius:8px;">保存</button>
      <button onclick="hideModal('m-add')" style="flex:1; padding:12px; background:var(--sur2); border:none; border-radius:8px;">閉じる</button>
    </div>
  </div>
</div>

<script>
// ═══════════ STATE ═══════════
const initD = {
  classes: [], 
  assignments: [],
  config: { showSat: true, showSun: false, theme: 'th-minimal' }
};
let D = JSON.parse(localStorage.getItem('tt_v2')) || initD;
let weekOffset = 0;
let selectedCell = null;

const DAYS = ['月','火','水','木','金','土','日'];
const DB_SAVE = () => localStorage.setItem('tt_v2', JSON.stringify(D));

// ═══════════ CALENDAR LOGIC ═══════════
function render() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  
  const today = new Date();
  const startOfWeek = new Date(today);
  const currentDay = today.getDay() === 0 ? 6 : today.getDay() - 1;
  startOfWeek.setDate(today.getDate() - currentDay + (weekOffset * 7));

  document.getElementById('cur-month').textContent = `${startOfWeek.getMonth() + 1}月`;

  const colCount = 1 + (D.config.showSat ? 1 : 0) + (D.config.showSun ? 1 : 0) + 5; 
  grid.style.gridTemplateColumns = `40px repeat(${colCount-1}, 1fr)`;

  // Header
  grid.appendChild(document.createElement('div'));
  for(let i=0; i<7; i++) {
    if(i === 5 && !D.config.showSat) continue;
    if(i === 6 && !D.config.showSun) continue;
    const h = document.createElement('div');
    h.style.textAlign = 'center';
    h.style.fontSize = '12px';
    h.innerHTML = `<div style="color:var(--mut)">${DAYS[i]}</div>`;
    grid.appendChild(h);
  }

  // Rows (1-5限)
  for(let p=1; p<=5; p++) {
    const t = document.createElement('div');
    t.textContent = p;
    t.style = 'display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--mut)';
    grid.appendChild(t);

    for(let d=0; d<7; d++) {
      if(d === 5 && !D.config.showSat) continue;
      if(d === 6 && !D.config.showSun) continue;
      
      const cell = document.createElement('div');
      cell.className = 'cell';
      
      const cls = D.classes.find(c => c.day === d && c.period === p);
      if(cls) {
        cell.innerHTML = `<div class="cblk c${cls.color || 0}"><b>${cls.name}</b><br>${cls.room}</div>`;
        cell.onclick = () => deleteClass(cls.id);
      } else {
        cell.onclick = () => showAdd(d, p);
      }
      grid.appendChild(cell);
    }
  }
}

// ═══════════ ACTIONS ═══════════
function showAdd(d, p) {
  selectedCell = { d, p };
  document.getElementById('add-title').textContent = `${DAYS[d]}曜 ${p}限の追加`;
  document.getElementById('m-add').style.display = 'flex';
}

function saveClass() {
  const name = document.getElementById('f-name').value;
  const room = document.getElementById('f-room').value;
  if(!name) return;

  D.classes.push({
    id: Date.now(),
    name, room,
    day: selectedCell.d,
    period: selectedCell.p,
    color: Math.floor(Math.random() * 3)
  });

  DB_SAVE();
  hideModal('m-add');
  render();
}

function deleteClass(id) {
  if(confirm('この授業を削除しますか？')) {
    D.classes = D.classes.filter(c => c.id !== id);
    DB_SAVE();
    render();
  }
}

function changeWeek(diff) {
  weekOffset = diff === 0 ? 0 : weekOffset + diff;
  render();
}

function switchTab(id, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('on'));
  document.getElementById(id).classList.add('active');
  el.classList.add('on');
}

function hideModal(id) { document.getElementById(id).style.display = 'none'; }

// スワイプ処理
let ts = 0;
document.addEventListener('touchstart', e => ts = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const te = e.changedTouches[0].clientX;
  if (ts - te > 100) changeWeek(1);
  if (te - ts > 100) changeWeek(-1);
});

render();
</script>
</body>
</html>
